version: '3.8'

services:
  whatsapp-notifier:
    build: .
    container_name: whatsapp-email-notifier
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
